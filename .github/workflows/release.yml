name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "v[0-9]+.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - name: Check Cargo.toml version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name=="blctl") | .version')
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $tag_version) does not match blctl's Cargo.toml version ($pkg_version). Bump the workspace version before tagging."
            exit 1
          fi

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

  release:
    name: Create Release
    needs: [verify-version, changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.release_body }}

  upload-assets:
    name: Build & Upload
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: blctl
          target: x86_64-unknown-linux-gnu
          archive: blctl-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: blctl
          target: aarch64-unknown-linux-gnu
          archive: blctl-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
